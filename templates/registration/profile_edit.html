{% extends 'layout/main_layout.html' %}
{% load crispy_forms_tags %}

{% block 'content' %}
<div class="row">
    <div class="col-lg-8">
        <h2>Редактирование профиля</h2>
        <hr>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            {{ u_form|crispy }}
            {{ p_form|crispy }}
            <button class="btn btn-success" type="submit">Сохранить изменения</button>
            <a href="{% url 'profile' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
